name: youtube-downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: >
          Enter one or more YouTube URLs. Each can be followed by optional
          “v”/“a” and a quality value (e.g. “v 480” or “a 192”).
          Separate entries with newlines, commas, or spaces.
        required: true
        type: string

      output_format:
        description: ‘Output format (applied when no per‑URL “v”/“a” is given)’
        required: false
        type: choice
        options:
          - mp4 (video)
          - mp3 (audio only)
          - best (auto)
        default: ‘mp4 (video)’

      video_quality:
        description: ‘Max video resolution (720p if nothing is specified)’
        required: false
        type: choice
        options:
          - ‘2160 (4K)’
          - ‘1080 (Full HD)’
          - ‘720 (HD)’
          - ‘480’
          - ‘360’
          - ‘best’
        default: ‘720 (HD)’

      audio_quality:
        description: ‘Audio bitrate for MP3 downloads’
        required: false
        type: choice
        options:
          - ‘320’
          - ‘192’
          - ‘128’
          - ‘64’
        default: ‘192’

      codec:
        description: ‘Preferred video codec (ignored for audio‑only)’
        required: false
        type: choice
        options:
          - ‘any (auto)’
          - ‘h264 (MP4 compatible)’
          - ‘vp9’
          - ‘av1’
        default: ‘any (auto)’

      preferred_language:
        description: ‘Preferred audio language (original if nothing is chosen)’
        required: false
        type: choice
        options:
          - ‘Original (default)’
          - ‘English’
          - ‘Persian (فارسی)’
          - ‘Arabic (العربية)’
          - ‘Japanese (日本語)’
          - ‘Chinese (中文)’
          - ‘Spanish (Español)’
          - ‘French (Français)’
          - ‘German (Deutsch)’
          - ‘Russian (Русский)’
          - ‘Korean (한국어)’
          - ‘Hindi (हिन्दी)’
          - ‘Portuguese (Português)’
          - ‘Italian (Italiano)’
        default: ‘Original (default)’

      playlist_items:
        description: ‘Playlist items (all, 3-7, 1,3,5, …). Leave empty for single video.’
        required: false
        type: string

      sponsorblock:
        description: ‘Skip sponsor/intro/outro segments via SponsorBlock’
        required: false
        type: boolean
        default: false

      embed_chapters:
        description: ‘Embed chapter markers in the output file’
        required: false
        type: boolean
        default: false

      write_description:
        description: ‘Save video description as a .description file’
        required: false
        type: boolean
        default: false

      download_subtitles:
        description: ‘Download subtitle files’
        required: false
        type: boolean
        default: false

      subtitle_langs:
        description: ‘Subtitle languages (comma‑separated, e.g. en,fa)’
        required: false
        type: string
        default: ‘en’

      embed_metadata:
        description: ‘Embed thumbnail and metadata in the output file’
        required: false
        type: boolean
        default: false

      trim_start:
        description: ‘Trim start timestamp (e.g. 0:33 or 1:22:10) – leave empty to skip’
        required: false
        type: string

      trim_end:
        description: ‘Trim end timestamp (e.g. 1:22 or 2:00:00) – leave empty to skip’
        required: false
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      # ── Cookies (secret only) ──
      - name: ‘🔐 Prepare cookies’
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > youtube-cookies.txt
            echo "✅ YouTube cookies written from secret."
          else
            echo "ℹ️  No YOUTUBE_COOKIES secret – proceeding without cookies."
          fi
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      # ── Parse URLs & per‑URL arguments ──
      - name: ‘📋 Parse all URLs and per‑URL arguments’
        id: parse
        run: |
          INPUT="${{ github.event.inputs.url }}"
          MODIFIED=$(echo "$INPUT" | tr ',' '\n')
          ENTRIES='[]'
          while IFS= read -r line; do
            line=$(echo "$line" | xargs)
            [ -z "$line" ] && continue
            tokens=($line)
            i=0
            while [ $i -lt ${#tokens[@]} ]; do
              token="${tokens[$i]}"
              if [[ "$token" =~ ^https?:// ]]; then
                link="$token"
                args=()
                i=$((i+1))
                while [ $i -lt ${#tokens[@]} ]; do
                  next="${tokens[$i]}"
                  [[ "$next" =~ ^https?:// ]] && break
                  args+=("$next")
                  i=$((i+1))
                done
                args_json=$(printf '%s\n' "${args[@]}" | jq -R . | jq -s .)
                entry=$(jq -n --arg link "$link" --argjson args "$args_json" '{link: $link, args: $args}')
                ENTRIES=$(echo "$ENTRIES" | jq ". + [$entry]")
              else
                i=$((i+1))
              fi
            done
          done <<< "$MODIFIED"

          ENTRIES_JSON=$(echo "$ENTRIES" | jq -c .)
          echo "ENTRIES_JSON=$ENTRIES_JSON" >> $GITHUB_OUTPUT
          IS_ANY_YT=$(echo "$ENTRIES" | jq '[.[].link | test("youtube\\.com/watch\\?v=|youtu\\.be/")] | any')
          echo "IS_ANY_YT=$IS_ANY_YT" >> $GITHUB_OUTPUT
          echo "✅ Parsed $(echo "$ENTRIES" | jq length) entries, any YouTube? $IS_ANY_YT"

      # ── Prepare PATH ──
      - name: ‘📁 Prepare tool paths’
        if: steps.parse.outputs.IS_ANY_YT == 'true'
        run: |
          mkdir -p ~/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          echo "✅ Tool paths prepared."

      # ── Install tools ──
      - name: ‘🛠️ Install download tools’
        if: steps.parse.outputs.IS_ANY_YT == 'true'
        run: |
          echo "🔽 Installing / updating yt-dlp..."
          if ! command -v yt-dlp &> /dev/null; then
            curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/.local/bin/yt-dlp
            chmod a+rx ~/.local/bin/yt-dlp
          fi
          echo "✅ yt-dlp ready."

          echo "🔽 Installing jq, ffmpeg..."
          if ! command -v jq &> /dev/null || ! command -v ffmpeg &> /dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq jq ffmpeg
          fi
          echo "✅ jq & ffmpeg ready."

          echo "🔽 Installing Deno..."
          if ! command -v deno &> /dev/null; then
            curl -fsSL https://deno.land/install.sh | sh -s -- -y
          fi
          echo "✅ Deno ready."

          echo "🔽 Installing additional fallback dependencies..."
          sudo apt-get install -y -qq python3-pip
          pip3 install --quiet pytube youtube-dl
          sudo curl -L https://yt-dl.org/downloads/latest/youtube-dl -o /usr/local/bin/youtube-dl
          sudo chmod a+rx /usr/local/bin/youtube-dl
          echo "✅ Fallback tools installed."

      # ── Primary download (original approach with language filter) ──
      - name: ‘⬇️ Primary download (original approach with language filter)’
        id: primary_download
        run: |
          set -e
          ENTRIES_JSON='${{ steps.parse.outputs.ENTRIES_JSON }}'
          OUTPUT_FOLDER="youtube"
          mkdir -p "$OUTPUT_FOLDER"

          # Global defaults
          GLOBAL_FORMAT="${{ github.event.inputs.output_format }}"
          GLOBAL_VQ="${{ github.event.inputs.video_quality }}"
          GLOBAL_AQ="${{ github.event.inputs.audio_quality }}"
          CODEC="${{ github.event.inputs.codec }}"
          LANG_INPUT="${{ github.event.inputs.preferred_language }}"

          # Map language choice to ISO code
          case "$LANG_INPUT" in
            "Original (default)") LANG_CODE="original" ;;
            "English")            LANG_CODE="en" ;;
            "Persian (فارسی)")    LANG_CODE="fa" ;;
            "Arabic (العربية)")   LANG_CODE="ar" ;;
            "Japanese (日本語)")   LANG_CODE="ja" ;;
            "Chinese (中文)")     LANG_CODE="zh" ;;
            "Spanish (Español)")  LANG_CODE="es" ;;
            "French (Français)")  LANG_CODE="fr" ;;
            "German (Deutsch)")   LANG_CODE="de" ;;
            "Russian (Русский)")  LANG_CODE="ru" ;;
            "Korean (한국어)")    LANG_CODE="ko" ;;
            "Hindi (हिन्दी)")     LANG_CODE="hi" ;;
            "Portuguese (Português)") LANG_CODE="pt" ;;
            "Italian (Italiano)") LANG_CODE="it" ;;
            *)                    LANG_CODE="original" ;;
          esac

          # Numeric qualities
          GLOBAL_VQ_NUM=$(echo "$GLOBAL_VQ" | grep -o '[0-9]*' | head -1)
          GLOBAL_AQ_NUM=$(echo "$GLOBAL_AQ" | grep -o '[0-9]*' | head -1)

          # Default type from format selector
          if [ "$GLOBAL_FORMAT" = "mp3 (audio only)" ]; then
            GLOBAL_TYPE="a"
            GLOBAL_VAL="$GLOBAL_AQ_NUM"
          else
            GLOBAL_TYPE="v"
            GLOBAL_VAL="$GLOBAL_VQ_NUM"
          fi

          COOKIE_ARGS=""
          [ -f youtube-cookies.txt ] && COOKIE_ARGS="--cookies youtube-cookies.txt"

          echo "🔧 Global settings: type=$GLOBAL_TYPE value=$GLOBAL_VAL lang=$LANG_INPUT ($LANG_CODE)"

          FAILED_ENTRIES='[]'
          count=$(echo "$ENTRIES_JSON" | jq length)
          for ((idx=0; idx<count; idx++)); do
            entry=$(echo "$ENTRIES_JSON" | jq ".[$idx]")
            link=$(echo "$entry" | jq -r '.link')
            args_len=$(echo "$entry" | jq '.args | length')
            echo "========================================"
            echo "🎬 Processing $((idx+1))/$count: $link"

            # Per‑URL overrides
            type="$GLOBAL_TYPE"
            val="$GLOBAL_VAL"
            if [ "$args_len" -ge 1 ]; then
              type=$(echo "$entry" | jq -r '.args[0]')
            fi
            if [ "$args_len" -ge 2 ]; then
              val=$(echo "$entry" | jq -r '.args[1]')
            fi

            # Validate
            if [[ "$type" != "v" && "$type" != "a" ]]; then
              echo "⚠️  Invalid type '$type' – using global default $GLOBAL_TYPE"
              type="$GLOBAL_TYPE"
              val="$GLOBAL_VAL"
            fi

            # If no quality, cap at 720p
            if [ -z "$val" ] || [ "$val" = "max" ]; then
              if [ "$type" = "v" ]; then val="720"; else val="192"; fi
              echo "ℹ️  No quality specified – using $val"
            fi

            echo "   🏷️  Type: $type  Quality: $val  Language: $LANG_CODE"

            # Non‑YouTube
            if ! echo "$link" | grep -Eq '(youtube\.com/watch\?v=|youtu\.be/)'; then
              echo "ℹ️  Non‑YouTube link – downloading with wget"
              cd "$OUTPUT_FOLDER"
              wget --progress=bar:force --content-disposition "$link" || {
                echo "❌ wget failed"
                FAILED_ENTRIES=$(echo "$FAILED_ENTRIES" | jq ". + [$entry]")
                cd ..
                continue
              }
              cd ..
              continue
            fi

            # ─── Extract video info ───
            echo "   🔍 Fetching format list..."
            JSON_ARGS="--cookies youtube-cookies.txt --js-runtimes deno --remote-components ejs:npm"
            video_json=$(yt-dlp $JSON_ARGS -j "$link" 2>/dev/null) || {
              echo "❌ yt-dlp -j failed"
              FAILED_ENTRIES=$(echo "$FAILED_ENTRIES" | jq ". + [$entry]")
              continue
            }

            if [ "$type" = "v" ]; then
              # ── Video: pick best video ≤ requested height, best audio (language filtered) ──
              height_val="$val"
              case "$height_val" in 2k) height_val=1440 ;; 4k) height_val=2160 ;; esac
              best_video=$(echo "$video_json" | jq -r --argjson h "$height_val" '
                [.formats[] | select(.vcodec != "none" and (.height // 0) <= $h)] |
                sort_by(.height, .tbr) | last | .format_id // ""
              ')

              # Select audio with language preference
              if [ "$LANG_CODE" != "original" ]; then
                lang_audio=$(echo "$video_json" | jq -r --arg lang "$LANG_CODE" '
                  [.formats[] | select(.vcodec == "none" and .acodec != "none" and .language == $lang)] |
                  sort_by(.tbr) | last | .format_id // ""
                ')
                if [ -z "$lang_audio" ]; then
                  echo "   ⚠️  No audio track for language '$LANG_CODE', falling back to original."
                  best_audio=$(echo "$video_json" | jq -r '
                    [.formats[] | select(.vcodec == "none" and .acodec != "none")] |
                    sort_by(.tbr) | last | .format_id // ""
                  ')
                else
                  best_audio="$lang_audio"
                  echo "   🎧 Using audio track: $LANG_CODE ($best_audio)"
                fi
              else
                best_audio=$(echo "$video_json" | jq -r '
                  [.formats[] | select(.vcodec == "none" and .acodec != "none")] |
                  sort_by(.tbr) | last | .format_id // ""
                ')
              fi

              if [ -z "$best_video" ] || [ -z "$best_audio" ]; then
                echo "❌ Could not find suitable video+audio formats"
                FAILED_ENTRIES=$(echo "$FAILED_ENTRIES" | jq ". + [$entry]")
                continue
              fi
              fmt="${best_video}+${best_audio}"
              actual_height=$(echo "$video_json" | jq -r --arg fid "$best_video" '
                [.formats[] | select(.format_id == $fid)][0] | .height // ""
              ')
              fps_info=$(echo "$video_json" | jq -r --arg fid "$best_video" '
                [.formats[] | select(.format_id == $fid)][0] | .fps // ""
              ')
              # Optionally add language tag to filename (uncomment next line)
              # lang_tag=$( [ "$LANG_CODE" != "original" ] && echo "_${LANG_CODE}" || echo "" )
              output_template="$OUTPUT_FOLDER/%(title)s-${actual_height}p${fps_info}.%(ext)s"
              echo "   📹 Downloading video format $fmt (${actual_height}p${fps_info})"
            else
              # ── Audio‑only: pick best audio matching language ──
              if [ "$LANG_CODE" != "original" ]; then
                audio_formats=$(echo "$video_json" | jq --arg lang "$LANG_CODE" '[.formats[] | select(.vcodec == "none" and .acodec != "none" and .language == $lang)]')
                if [ "$(echo "$audio_formats" | jq length)" -eq 0 ]; then
                  echo "   ⚠️  No audio track for language '$LANG_CODE', falling back to original."
                  audio_formats=$(echo "$video_json" | jq '[.formats[] | select(.vcodec == "none" and .acodec != "none")]')
                fi
              else
                audio_formats=$(echo "$video_json" | jq '[.formats[] | select(.vcodec == "none" and .acodec != "none")]')
              fi

              if [ "$(echo "$audio_formats" | jq length)" -eq 0 ]; then
                echo "❌ No audio-only formats found"
                FAILED_ENTRIES=$(echo "$FAILED_ENTRIES" | jq ". + [$entry]")
                continue
              fi

              bitrate="$val"
              chosen=$(echo "$audio_formats" | jq -r --argjson br "$bitrate" '
                map({br: (.abr // .tbr), fid: .format_id}) |
                map({br, fid, d: (.br - $br | abs)}) |
                sort_by(.d, .br) | first | "\(.fid) \(.br)"
              ')
              fmt=$(echo "$chosen" | awk '{print $1}')
              abr_info=$(echo "$chosen" | awk '{print $2}')
              output_template="$OUTPUT_FOLDER/%(title)s-${abr_info}kbps.%(ext)s"
              echo "   🎵 Downloading audio format $fmt (${abr_info}kbps)"
            fi

            # Download with yt‑dlp
            YT_ARGS="--cookies youtube-cookies.txt --js-runtimes deno --remote-components ejs:npm --no-progress"
            if ! yt-dlp $YT_ARGS -f "$fmt" -o "$output_template" "$link"; then
              echo "❌ Primary download failed – will try fallbacks later"
              FAILED_ENTRIES=$(echo "$FAILED_ENTRIES" | jq ". + [$entry]")
            else
              echo "   ✅ Download succeeded"
            fi
          done

          echo "FAILED_ENTRIES_JSON=$(echo "$FAILED_ENTRIES" | jq -c .)" >> $GITHUB_OUTPUT
          echo "LANG_CODE=$LANG_CODE" >> $GITHUB_OUTPUT
          echo "📊 Primary phase done. Failures: $(echo "$FAILED_ENTRIES" | jq length)"

      # ── Fallback pipelines (12 strategies) ──
      - name: ‘🔄 Fallback pipelines for failed entries’
        if: steps.primary_download.outputs.FAILED_ENTRIES_JSON != '[]'
        run: |
          set -e
          FAILED_ENTRIES='${{ steps.primary_download.outputs.FAILED_ENTRIES_JSON }}'
          LANG_CODE='${{ steps.primary_download.outputs.LANG_CODE }}'
          count=$(echo "$FAILED_ENTRIES" | jq length)
          echo "🔄 Attempting fallback for $count failed entries (language=$LANG_CODE)..."

          OUTPUT_FOLDER="youtube"

          build_suffix() {
            local type="$1"
            local val="$2"
            if [ "$type" = "a" ]; then
              echo "${val}kbps"
            else
              echo "${val}p"
            fi
          }

          # ── Original 10 fallbacks ──
          fallback_ytdlp_extractor() {
            echo "[fallback 1] yt-dlp with Android extractor"
            local suf=$(build_suffix "$2" "$3")
            yt-dlp --cookies youtube-cookies.txt --extractor-args "youtube:player_client=android" \
                   --js-runtimes deno --remote-components ejs:npm --no-progress \
                   -o "$OUTPUT_FOLDER/%(title)s-${suf}.%(ext)s" "$1"
          }
          fallback_ytdlp_ios() {
            echo "[fallback 2] yt-dlp with iOS extractor"
            local suf=$(build_suffix "$2" "$3")
            yt-dlp --cookies youtube-cookies.txt --extractor-args "youtube:player_client=ios" \
                   --js-runtimes deno --remote-components ejs:npm --no-progress \
                   -o "$OUTPUT_FOLDER/%(title)s-${suf}.%(ext)s" "$1"
          }
          fallback_ytdlp_nocookies() {
            echo "[fallback 3] yt-dlp without cookies"
            local suf=$(build_suffix "$2" "$3")
            yt-dlp --js-runtimes deno --remote-components ejs:npm --no-progress \
                   -o "$OUTPUT_FOLDER/%(title)s-${suf}.%(ext)s" "$1"
          }
          fallback_youtube_dl() {
            echo "[fallback 4] youtube-dl"
            local suf=$(build_suffix "$2" "$3")
            youtube-dl --no-progress -o "$OUTPUT_FOLDER/%(title)s-${suf}.%(ext)s" "$1"
          }
          fallback_pytube_max() {
            echo "[fallback 5] pytube (best quality)"
            python3 -c "
          import sys, os
          from pytube import YouTube
          url = sys.argv[1]
          typ = sys.argv[2]
          val = sys.argv[3]
          suf = f'{val}kbps' if typ == 'a' else f'{val}p'
          yt = YouTube(url)
          if typ == 'a':
              stream = yt.streams.get_audio_only()
          else:
              stream = yt.streams.get_highest_resolution()
          out = stream.download(output_path='$OUTPUT_FOLDER')
          base, ext = os.path.splitext(out)
          os.rename(out, f'{base}_{suf}{ext}')
          " "$1" "$2" "$3"
          }
          fallback_pytube_res() {
            echo "[fallback 6] pytube (resolution $3)"
            python3 -c "
          import sys, os
          from pytube import YouTube
          url = sys.argv[1]
          target_res = int(sys.argv[2])
          suf = f'{target_res}p'
          yt = YouTube(url)
          streams = yt.streams.filter(progressive=True, res=f'{target_res}p')
          if not streams:
              streams = yt.streams.filter(adaptive=True, res=f'{target_res}p')
          if streams:
              stream = streams.first()
          else:
              stream = yt.streams.get_highest_resolution()
              suf = f'{sys.argv[2]}p'
          out = stream.download(output_path='$OUTPUT_FOLDER')
          base, ext = os.path.splitext(out)
          os.rename(out, f'{base}_{suf}{ext}')
          " "$1" "$3"
          }
          fallback_thirdparty_api1() {
            echo "[fallback 7] External API (loader.to)"
            local suf=$(build_suffix "$2" "$3")
            API_URL="https://loader.to/ajax/download.php?format=best&url=$(python3 -c "
          import urllib.parse
          print(urllib.parse.quote('$1'))
          ")"
            resp=$(curl -s "$API_URL")
            dlink=$(echo "$resp" | jq -r '.link? // empty')
            if [ -n "$dlink" ]; then
              wget -O "$OUTPUT_FOLDER/%(title)s-${suf}.%(ext)s" "$dlink"
            else
              return 1
            fi
          }
          fallback_thirdparty_api2() {
            echo "[fallback 8] External API (api.vevioz.com)"
            local suf=$(build_suffix "$2" "$3")
            API_URL="https://api.vevioz.com/apis/downloader?url=$(python3 -c "
          import urllib.parse
          print(urllib.parse.quote('$1'))
          ")"
            resp=$(curl -s "$API_URL")
            dlink=$(echo "$resp" | jq -r '.download_url? // empty')
            if [ -n "$dlink" ]; then
              wget -O "$OUTPUT_FOLDER/%(title)s-${suf}.%(ext)s" "$dlink"
            else
              return 1
            fi
          }
          fallback_cobalt() {
            echo "[fallback 9] cobalt.tools API"
            local suf=$(build_suffix "$2" "$3")
            API_URL="https://api.cobalt.tools/api/json"
            payload='{"url":"'"$1"'","vCodec":"h264","aFormat":"mp3","videoQuality":"720"}'
            resp=$(curl -s -H "Content-Type: application/json" -d "$payload" "$API_URL")
            dlink=$(echo "$resp" | jq -r '.url? // empty')
            if [ -n "$dlink" ]; then
              wget -O "$OUTPUT_FOLDER/%(title)s-${suf}.%(ext)s" "$dlink"
            else
              return 1
            fi
          }
          fallback_force_ipv4() {
            echo "[fallback 10] yt-dlp with forced IPv4 and retries"
            local suf=$(build_suffix "$2" "$3")
            yt-dlp --force-ipv4 --retries 10 --fragment-retries 10 --cookies youtube-cookies.txt \
                   --js-runtimes deno --remote-components ejs:npm --no-progress \
                   -o "$OUTPUT_FOLDER/%(title)s-${suf}.%(ext)s" "$1"
          }

          # ── Fallback 11: ytmp3.gg API ──
          fallback_ytmp3_api() {
            echo "[fallback 11] ytmp3.gg API (Meli-Action style)"
            local type="$2"
            local val="$3"
            FORMAT="mp4"
            QUALITY="720p"
            if [ "$type" = "a" ]; then
              FORMAT="mp3"
              QUALITY="${val:-192}kbps"
            else
              QUALITY="${val:-720}p"
            fi
            python3 << 'PYEOF'
          import os, sys, time, re, requests
          URL = os.environ.get('FB_URL')
          FMT = os.environ.get('FB_FMT')
          QUAL = os.environ.get('FB_QUAL')
          is_audio = FMT == 'mp3'
          if is_audio:
              QUAL = QUAL if QUAL in ('64kbps','128kbps','192kbps','320kbps') else '192kbps'
          else:
              QUAL = QUAL if QUAL in ('720p','1080p') else '720p'
          payload = { "url": URL, "os": "linux", "output": {"type": "audio" if is_audio else "video", "format": FMT} }
          if is_audio:
              payload["audio"] = {"bitrate": QUAL}
          else:
              payload["output"]["quality"] = QUAL
          s = requests.Session()
          s.headers.update({"User-Agent": "Mozilla/5.0"})
          s.get("https://media.ytmp3.gg/")
          resp = s.post("https://hub.ytconvert.org/api/download", json=payload, timeout=30)
          resp.raise_for_status()
          data = resp.json()
          status_url = data.get('statusUrl')
          title = data.get('title', 'video')
          dl_url = None
          for _ in range(150):
              time.sleep(2)
              r = s.get(status_url, timeout=20)
              status = r.json()
              if status.get('status') == 'completed':
                  dl_url = status.get('downloadUrl')
                  break
              if status.get('status') == 'failed':
                  print("::error::Server failed to prepare the video")
                  sys.exit(1)
          if not dl_url:
              print("::error::Could not get download link")
              sys.exit(1)
          vid = re.search(r'(?:v=|youtu\.be/)([a-zA-Z0-9_-]{11})', URL)[1]
          clean = re.sub(r'[^a-zA-Z0-9\-_()\[\]]', '_', title.replace(' ', '_'))
          clean = re.sub(r'_+', '_', clean).strip('_')[:70] or vid
          fname = f"{clean}_{vid}_{QUAL}.{FMT}"
          with open(".download_info", "w", encoding="utf-8") as f:
              f.write(f"{dl_url}\n{fname}\n{title}")
          PYEOF
            DL_URL=$(head -1 .download_info)
            FILENAME=$(sed -n '2p' .download_info)
            echo "   🌐 Downloading via ytmp3.gg: $FILENAME"
            curl -L --fail --progress-bar -o "$OUTPUT_FOLDER/$FILENAME" "$DL_URL"
            if [ ! -s "$OUTPUT_FOLDER/$FILENAME" ]; then
              echo "❌ ytmp3.gg download empty"
              return 1
            fi
            echo "   ✅ ytmp3.gg success"
          }

          # ── Fallback 12: Advanced yt‑dlp WITH language filter ──
          fallback_ytdlp_advanced() {
            echo "[fallback 12] yt-dlp with web_music+tv+web clients and language filter"
            local suf=$(build_suffix "$2" "$3")
            LANG_ARG=""
            [ "$LANG_CODE" != "original" ] && LANG_ARG=";lang=$LANG_CODE"
            yt-dlp \
              --js-runtimes deno \
              --newline \
              --extractor-args "youtube:player_client=web_music,web,tv${LANG_ARG}" \
              --concurrent-fragments 4 \
              $COOKIE_ARGS \
              -o "$OUTPUT_FOLDER/%(title)s-${suf}.%(ext)s" \
              "$1"
          }

          FALLBACKS=(
            fallback_ytdlp_extractor
            fallback_ytdlp_ios
            fallback_ytdlp_nocookies
            fallback_youtube_dl
            fallback_pytube_max
            fallback_pytube_res
            fallback_thirdparty_api1
            fallback_thirdparty_api2
            fallback_cobalt
            fallback_force_ipv4
            fallback_ytmp3_api
            fallback_ytdlp_advanced
          )

          for ((idx=0; idx<count; idx++)); do
            entry=$(echo "$FAILED_ENTRIES" | jq ".[$idx]")
            link=$(echo "$entry" | jq -r '.link')
            args_len=$(echo "$entry" | jq '.args | length')
            type="v"; val1="720"
            [ "$args_len" -ge 1 ] && type=$(echo "$entry" | jq -r '.args[0]')
            [ "$args_len" -ge 2 ] && val1=$(echo "$entry" | jq -r '.args[1]')

            if ! echo "$link" | grep -Eq '(youtube\.com/watch\?v=|youtu\.be/)'; then
              continue
            fi

            echo "========================================"
            echo "🔄 Fallback for: $link ($type $val1)"
            success=0
            for func in "${FALLBACKS[@]}"; do
              if $func "$link" "$type" "$val1"; then
                echo "   ✅ Fallback '$func' succeeded"
                success=1
                break
              else
                echo "   ❌ Fallback '$func' failed"
              fi
            done
            if [ $success -eq 0 ]; then
              echo "❌ All 12 fallback pipelines failed for $link"
            fi
          done
        env:
          OUTPUT_FOLDER: youtube
          FRAGMENTS: 4
          COOKIE_ARGS: ${{ steps.primary_download.outputs.COOKIE_ARGS }}

      # ── Split oversized files ──
      - name: ‘✂️  Split oversized files (>99MB)’
        run: |
          OUTPUT_FOLDER="youtube"
          THRESH_MB=99
          THRESH_BYTES=$((THRESH_MB * 1024 * 1024))
          echo "🔍 Checking files in '$OUTPUT_FOLDER' for >${THRESH_MB}MB..."
          for f in "$OUTPUT_FOLDER"/*; do
            [ -f "$f" ] || continue
            fs=$(stat -c%s "$f")
            fname=$(basename "$f")
            if [ "$fs" -gt "$THRESH_BYTES" ]; then
              echo "   ✂️  Splitting $fname ($((fs/1024/1024)) MB) into ${THRESH_MB}MB parts"
              zip -j -s "${THRESH_MB}m" "$OUTPUT_FOLDER/${fname}.zip" "$f"
              rm "$f"
            fi
          done
          echo "✅ Splitting complete."

      # ── Push to repo ──
      - name: ‘📤 Push to repository’
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 524288000
          git add youtube/
          git commit -m "⬇️ YouTube download [skip ci]" || echo "Nothing to commit"
          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            echo "🚀 Push attempt $i..."
            git pull --rebase --autostash origin "${{ github.ref_name }}"
            if git push origin "${{ github.ref_name }}"; then
              echo "✅ Push succeeded"
              break
            else
              if [ $i -lt $RETRIES ]; then
                echo "⏳ Push rejected, retrying in 3s..."
                sleep 3
              else
                echo "❌ Push failed after $RETRIES attempts"
                exit 1
              fi
            fi
          done

      # ── Cleanup ──
      - name: ‘🧹 Cleanup’
        if: always()
        run: |
          rm -rf .download_info youtube-cookies.txt 2>/dev/null || true
          echo "✅ Cleanup done."
